<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team-Pausenfenster</title>
<style>
  *{box-sizing:border-box}
  :root{--bg:#f6f7f9;--panel:#fff;--ink:#1c1e21;--muted:#697077;--line:#e6e8eb;--accent:#5b6cff;--accent-ink:#fff;--r:10px;--sh:0 1px 2px rgba(16,18,28,.06);--ff:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  body[data-fidelity=lofi]{--panel:#fffef9;--line:#cfcabb;--ink:#2b2b2b;--muted:#7a756a;--accent:#5f6368;--r:14px;--sh:none;--ff:"Comic Sans MS","Segoe Print","Bradley Hand",cursive}
  body[data-fidelity=hifi]{--bg:#fbfbfd;--panel:#fff;--ink:#0c0d12;--muted:#6b7280;--line:#ececf1;--accent:#5e6ad2;--r:8px;--sh:0 1px 3px rgba(16,18,40,.08),0 0 0 1px rgba(16,18,40,.03);--ff:Inter,-apple-system,Segoe UI,Roboto,sans-serif}
  body{margin:0;font:15px/1.5 var(--ff);color:var(--ink);background:var(--bg)}
  body[data-fidelity=lofi] .card,body[data-fidelity=lofi] .el input,body[data-fidelity=lofi] .el select{border-style:dashed}
  #lofi-banner{display:none}
  body[data-fidelity=lofi] #lofi-banner{display:block;background:#fff3cd;color:#7a5b00;text-align:center;padding:5px;font-size:12px;border-bottom:1px dashed #cfcabb}
  header{padding:16px 22px;background:var(--panel);border-bottom:1px solid var(--line)}
  h1{font-size:18px;margin:0}.sub{color:var(--muted);font-size:13px;margin-top:2px}
  nav{display:flex;gap:6px;flex-wrap:wrap;padding:10px 22px;background:var(--panel);border-bottom:1px solid var(--line)}
  nav button{font:inherit;border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:5px 11px;cursor:pointer;color:var(--ink)}
  nav button.active{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  main{max-width:920px;margin:0 auto;padding:22px}
  .screen{display:none}.screen.active{display:block}
  .screen h2{font-size:17px;margin:0 0 14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin:0 0 18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:16px;cursor:default;display:flex;flex-direction:column;gap:8px;transition:border-color .12s,transform .12s}
  .card.clickable{cursor:pointer}.card.clickable:hover{border-color:var(--accent);transform:translateY(-1px)}
  .card .tag{align-self:flex-start;font-size:11px;color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);padding:2px 8px;border-radius:999px}
  .card h3{margin:0;font-size:15px}.card p{margin:0;color:var(--muted);font-size:14px}
  .card .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .el{margin:0 0 14px}.el label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
  .el input,.el select{font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:var(--r);width:100%;max-width:380px;background:var(--bg);color:var(--ink)}
  .el p{margin:0;max-width:62ch}.el a{color:var(--accent)}
  .btn{font:inherit;border:1px solid transparent;background:var(--accent);color:var(--accent-ink);border-radius:var(--r);padding:8px 14px;cursor:pointer;box-shadow:var(--sh)}
  .btn.secondary{background:var(--panel);color:var(--ink);border-color:var(--line)}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .15s;pointer-events:none}#toast.show{opacity:.95}
</style>
</head>
<body>
<div id="lofi-banner">Lo-Fi · zum Testen, nicht final</div>
<header><h1 id="apptitle">Team-Pausenfenster</h1><div class="sub" id="appsummary">Gestaffelte Essensfenster mit Vertretungs-Pairing für Teams ohne Kalender-Autonomie (SLA-Betrieb). Lo-Fi-Konzept: das Team hält sich gegenseitig den Rücken frei — das Board macht es sichtbar.</div></header>
<nav id="nav"></nav>
<main id="screens"></main>
<div id="toast"></div>
<script id="concept" type="application/json">{"title": "Team-Pausenfenster", "summary": "Gestaffelte Essensfenster mit Vertretungs-Pairing für Teams ohne Kalender-Autonomie (SLA-Betrieb). Lo-Fi-Konzept: das Team hält sich gegenseitig den Rücken frei — das Board macht es sichtbar.", "fidelity": "lofi", "start": "board", "screens": [{"id": "board", "title": "Team-Board · Heute", "cards": [{"id": "card-tobias", "tag": "11:00–11:30", "title": "Tobias R.", "body": "Vertretung: Sandra — nimmt sein Postfach mit.", "meta": "Status: geplant"}, {"id": "card-dilara", "tag": "11:30–12:00", "title": "Dilara K.", "body": "Vertretung: Ayşe — übernimmt Queue-Platz 3.", "meta": "Status: bestätigt ✓"}, {"id": "card-ayse", "tag": "12:00–12:30", "title": "Ayşe T.", "body": "Vertretung: Dilara — Rücktausch nach dem Coaching.", "meta": "Status: bestätigt ✓"}, {"id": "card-janine", "tag": "12:30–13:00", "title": "Janine W. (Teamlead)", "body": "Vertretung: Marco — das Eskalations-Headset geht für 30 Minuten an ihn.", "meta": "Status: noch unbestätigt — antippen zum Bestätigen", "goto": "vertretung", "action": "vertretung"}, {"id": "card-marco", "tag": "13:00–13:30", "title": "Marco L.", "body": "Vertretung: Janine — Übergabe-Themen parkt er vorher im Board.", "meta": "Status: geplant"}, {"id": "card-sandra", "tag": "13:30–14:00", "title": "Sandra B.", "body": "Vertretung: Tobias — letzte Schiene, Puffer bei Anrufwelle.", "meta": "Status: geplant"}], "elements": [{"id": "wallboard-status", "kind": "text", "label": "Wallboard jetzt: 12 Anrufe in der Queue · Erreichbarkeit heute 81/20 · Besetzung 6/6"}, {"id": "staffel-regel", "kind": "text", "label": "Gestaffelte Fenster: Es ist nie mehr als eine Person gleichzeitig weg — die Erreichbarkeit bleibt über 80/20, ohne dass jemand sein Essen am Platz isst."}, {"id": "btn-tausch", "kind": "button", "label": "Fenster tauschen", "goto": "tausch", "action": "tausch"}, {"id": "btn-ausfall", "kind": "button", "label": "Krankmeldung einplanen (Neuverteilung)", "goto": "ausfall", "action": "ausfall"}, {"id": "btn-ausnahme", "kind": "button", "label": "Eskalations-Ausnahme markieren", "goto": "ausnahme", "action": "ausnahme"}, {"id": "link-report", "kind": "link", "label": "Wochen-Nachweis für die Bereichsleitung ansehen", "goto": "report", "action": "report"}]}, {"id": "vertretung", "title": "Vertretung bestätigen", "elements": [{"id": "vertretung-detail", "kind": "text", "label": "Janine 12:30–13:00 — Vertretung: Marco. Marco hält dir den Rücken frei: Das Eskalations-Headset liegt von 12:30 bis 13:00 bei ihm, der Queue-Alarm ab 15 Anrufen geht zuerst an ihn."}, {"id": "anrufwelle-regel", "kind": "text", "label": "Bei Anrufwelle gilt: Dein Fenster wird nicht gestrichen, sondern automatisch auf das Nachhol-Fenster 14:30–15:00 geschoben. Marco bekommt das als Hinweis auf seine Karte."}, {"id": "btn-bestaetigen", "kind": "button", "label": "Vertretung bestätigen & zurück zum Board", "goto": "board", "action": "board"}, {"id": "btn-ablehnen", "kind": "button", "label": "Passt nicht — Tausch vorschlagen", "variant": "secondary", "goto": "tausch", "action": "tausch"}]}, {"id": "tausch", "title": "Fenster tauschen", "elements": [{"id": "tausch-intro", "kind": "text", "label": "Ein Tausch gilt nur, wenn die Vertretungs-Kette geschlossen bleibt — das Board prüft das automatisch und lehnt Tausche ab, bei denen zwei Personen gleichzeitig weg wären."}, {"id": "tausch-mein-fenster", "kind": "select", "label": "Mein Fenster", "options": ["Tobias 11:00–11:30", "Dilara 11:30–12:00", "Ayşe 12:00–12:30", "Janine 12:30–13:00", "Marco 13:00–13:30", "Sandra 13:30–14:00"]}, {"id": "tausch-partner", "kind": "select", "label": "Tauschen mit", "options": ["Tobias 11:00–11:30", "Dilara 11:30–12:00", "Ayşe 12:00–12:30", "Janine 12:30–13:00", "Marco 13:00–13:30", "Sandra 13:30–14:00"]}, {"id": "tausch-hinweis", "kind": "text", "label": "Die Vertretungs-Pairings wandern mit dem Tausch mit — niemand muss neu verhandeln, wer wem den Rücken freihält."}, {"id": "btn-tausch-anfragen", "kind": "button", "label": "Tausch anfragen", "goto": "board", "action": "board"}, {"id": "btn-tausch-abbrechen", "kind": "button", "label": "Abbrechen", "variant": "secondary", "goto": "board", "action": "board"}]}, {"id": "ausfall", "title": "Krankmeldungen · Neuverteilung", "cards": [{"id": "neu-ayse", "tag": "11:45–12:15", "title": "Ayşe T.", "body": "Fenster um 15 Minuten geschoben. Neue Vertretung: Sandra (Dilara fällt aus).", "meta": "vorher: 12:00–12:30"}, {"id": "neu-janine", "tag": "12:30–13:00", "title": "Janine W. (Teamlead)", "body": "Fenster bleibt — das Eskalations-Headset liegt weiter bei Marco.", "meta": "unverändert"}, {"id": "neu-marco", "tag": "13:15–13:45", "title": "Marco L.", "body": "Fenster um 15 Minuten geschoben. Vertretung: Janine.", "meta": "vorher: 13:00–13:30"}, {"id": "neu-sandra", "tag": "13:45–14:15", "title": "Sandra B.", "body": "Fenster bleibt 30 Minuten, aber der Anrufwellen-Puffer entfällt. Vertretung: Marco.", "meta": "vorher: 13:30–14:00"}], "elements": [{"id": "ausfall-szenario", "kind": "text", "label": "Szenario: 2 Krankmeldungen vor Schichtstart (Tobias und Dilara). Besetzung 4/6 — das Board verteilt die Fenster neu, bevor die Frühschicht beginnt:"}, {"id": "ausfall-regel", "kind": "text", "label": "Regel bei 4/6: Fenster werden geschoben, nie gestrichen. Erst wenn die Erreichbarkeit unter 80/20 fällt, greift die Eskalations-Ausnahme — mit sichtbarem Nachhol-Fenster, nicht mit Verzicht."}, {"id": "btn-neuverteilung", "kind": "button", "label": "Neuverteilung ins Board übernehmen", "goto": "board", "action": "board"}, {"id": "btn-verwerfen", "kind": "button", "label": "Verwerfen", "variant": "secondary", "goto": "board", "action": "board"}]}, {"id": "ausnahme", "title": "Eskalations-Ausnahme", "elements": [{"id": "ausnahme-intro", "kind": "text", "label": "Anrufwelle oder Eskalation mitten im eigenen Fenster? Ausnahme markieren — für das Team sichtbar, mit festem Nachhol-Fenster am selben Tag. Eine Ausnahme ohne Nachhol-Fenster gibt es nicht."}, {"id": "ausnahme-person", "kind": "select", "label": "Wessen Fenster fällt aus?", "options": ["Tobias R.", "Dilara K.", "Ayşe T.", "Janine W.", "Marco L.", "Sandra B."]}, {"id": "ausnahme-nachhol", "kind": "select", "label": "Nachhol-Fenster heute", "options": ["14:30–15:00", "15:00–15:30", "15:30–16:00"]}, {"id": "ausnahme-datenschutz", "kind": "text", "label": "Im Wochen-Nachweis zählt nur: Fenster genommen / nachgeholt / verfallen. Keine Minuten-Protokolle, keine Einzelauswertung pro Person an die Bereichsleitung."}, {"id": "btn-ausnahme-markieren", "kind": "button", "label": "Ausnahme markieren", "goto": "board", "action": "board"}, {"id": "btn-ausnahme-zurueck", "kind": "button", "label": "Zurück zum Board", "variant": "secondary", "goto": "board", "action": "board"}]}, {"id": "report", "title": "Wochen-Nachweis (Bereichsleitung)", "elements": [{"id": "report-team", "kind": "text", "label": "Team-Sicht, keine Personen-Sicht: Team Wolf — 28 von 30 Fenstern genommen, 2 nachgeholt, 0 verfallen. Erreichbarkeit gehalten: 81/20."}, {"id": "report-grenze", "kind": "text", "label": "Was die Bereichsleitung NICHT sieht: wer wann pausiert hat, Einzelzeiten, Gründe für Ausnahmen. Der Nachweis ist ein Argument für das Team — kein Kontrollinstrument über einzelne Personen."}, {"id": "report-argument", "kind": "text", "label": "Lesart fürs Krankenquoten-Review: Pausen genommen UND SLA gehalten — beides zusammen, schwarz auf weiß."}, {"id": "btn-report-zurueck", "kind": "button", "label": "Zurück zum Board", "goto": "board", "action": "board"}]}]}</script>
<script>
(function(){
  var C = JSON.parse(document.getElementById('concept').textContent);
  document.body.dataset.fidelity = C.fidelity || 'midfi';
  document.getElementById('apptitle').textContent = C.title || 'Prototype';
  document.getElementById('appsummary').textContent = C.summary || '';
  var nav=document.getElementById('nav'), root=document.getElementById('screens'), state={};
  function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1400);}
  function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.toggle('active',s.dataset.id===id);});document.querySelectorAll('#nav button').forEach(function(b){b.classList.toggle('active',b.dataset.id===id);});}
  function renderEl(el){
    var wrap=document.createElement('div');wrap.className='el';
    if(el.kind==='text'){var p=document.createElement('p');p.textContent=el.label||'';wrap.appendChild(p);}
    else if(el.kind==='input'){var l=document.createElement('label');l.textContent=el.label||el.id;var inp=document.createElement('input');inp.id=el.id;inp.setAttribute('aria-label',el.label||el.id);inp.addEventListener('input',function(){state[el.id]=inp.value;});wrap.appendChild(l);wrap.appendChild(inp);}
    else if(el.kind==='select'){var l2=document.createElement('label');l2.textContent=el.label||el.id;var sel=document.createElement('select');sel.id=el.id;sel.setAttribute('aria-label',el.label||el.id);(el.options||[]).forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;sel.appendChild(op);});sel.addEventListener('change',function(){state[el.id]=sel.value;});wrap.appendChild(l2);wrap.appendChild(sel);}
    else if(el.kind==='link'){var a=document.createElement('a');a.href='#';a.id=el.id;a.textContent=el.label||el.id;a.setAttribute('aria-label',el.label||el.id);if(el.goto){a.addEventListener('click',function(e){e.preventDefault();show(el.goto);});}wrap.appendChild(a);}
    else {var b=document.createElement('button');b.className='btn'+(el.variant==='secondary'?' secondary':'');b.id=el.id;b.textContent=el.label||el.id;b.setAttribute('aria-label',el.label||el.id);if(el.goto){b.addEventListener('click',function(){show(el.goto);});}else{b.addEventListener('click',function(){toast((el.label||'Done')+' ✓');});}wrap.appendChild(b);}
    return wrap;
  }
  (C.screens||[]).forEach(function(scr){
    var nb=document.createElement('button');nb.textContent=scr.title||scr.id;nb.dataset.id=scr.id;nb.addEventListener('click',function(){show(scr.id);});nav.appendChild(nb);
    var sec=document.createElement('section');sec.className='screen';sec.dataset.id=scr.id;
    var h=document.createElement('h2');h.textContent=scr.title||scr.id;sec.appendChild(h);
    if((scr.cards||[]).length){var g=document.createElement('div');g.className='grid';scr.cards.forEach(function(c){
      var card=document.createElement('div');card.className='card'+(c.goto?' clickable':'');if(c.id){card.id=c.id;}card.setAttribute('aria-label',c.title||c.id||'card');
      if(c.tag){var tg=document.createElement('span');tg.className='tag';tg.textContent=c.tag;card.appendChild(tg);}
      var h3=document.createElement('h3');h3.textContent=c.title||'';card.appendChild(h3);
      if(c.body){var p=document.createElement('p');p.textContent=c.body;card.appendChild(p);}
      if(c.meta){var mt=document.createElement('div');mt.className='meta';mt.textContent=c.meta;card.appendChild(mt);}
      if(c.goto){card.setAttribute('role','button');card.tabIndex=0;card.addEventListener('click',function(){show(c.goto);});card.addEventListener('keydown',function(e){if(e.key==='Enter')show(c.goto);});}
      g.appendChild(card);
    });sec.appendChild(g);}
    (scr.elements||[]).forEach(function(el){sec.appendChild(renderEl(el));});
    root.appendChild(sec);
  });
  show(C.start || ((C.screens||[])[0]||{}).id);
})();
</script>
</body>
</html>
