<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>10-Minuten-Familienschutz — Lo-Fi</title>
<style>
  /* Lo-fi / sketch styling: monochrome, dashed, deliberately unpolished. */
  :root{--ink:#333;--muted:#888;--line:#bbb;--paper:#fafaf7;}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Comic Sans MS","Segoe Print",cursive,system-ui;font-size:15px;color:var(--ink);background:var(--paper)}
  .lofi-banner{background:#222;color:#fff;text-align:center;font-size:12px;letter-spacing:.15em;padding:4px;text-transform:uppercase}
  header{padding:14px 20px;border-bottom:2px dashed var(--line)}
  h1{font-size:18px;margin:0}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  nav{display:flex;gap:6px;flex-wrap:wrap;padding:9px 20px;border-bottom:2px dashed var(--line)}
  nav button{font-family:inherit;border:2px dashed var(--line);background:none;border-radius:10px;padding:5px 11px;cursor:pointer;color:var(--ink)}
  nav button.active{border-style:solid;background:#eee}
  main{max-width:720px;margin:0 auto;padding:20px}
  .screen{display:none}
  .screen.active{display:block}
  .screen h2{font-size:16px;margin:0 0 12px;text-decoration:underline}
  .el{margin:0 0 14px}
  .el label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
  .el input,.el select{font-family:inherit;padding:8px 10px;border:2px dashed var(--line);border-radius:8px;width:100%;max-width:340px;background:none}
  .el button{font-family:inherit;border:2px solid var(--ink);background:none;color:var(--ink);border-radius:12px;padding:9px 15px;cursor:pointer}
  .el a{color:var(--ink)}
  .el p{margin:0;max-width:60ch}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .15s;pointer-events:none}
  #toast.show{opacity:.95}
</style>
</head>
<body>
<div class="lofi-banner">Lo-Fi Skizze · zum Testen, nicht final</div>
<header><h1 id="apptitle">10-Minuten-Familienschutz</h1><div class="sub" id="appsummary">Ohne Fachchinesisch: was bekommt deine Familie, wenn dir was passiert – in 10 Minuten, flexibel.</div></header>
<nav id="nav"></nav>
<main id="screens"></main>
<div id="toast"></div>
<script id="concept" type="application/json">{"title": "10-Minuten-Familienschutz", "summary": "Ohne Fachchinesisch: was bekommt deine Familie, wenn dir was passiert – in 10 Minuten, flexibel.", "start": "intro", "screens": [{"id": "intro", "title": "Start", "elements": [{"kind": "text", "id": "i", "label": "In Klartext: wenn dir etwas passiert, wer braucht dann Geld – und wie viel? In 10 Minuten, ohne Termin."}, {"kind": "button", "id": "go", "label": "Los", "goto": "wer"}]}, {"id": "wer", "title": "Wer hängt an dir?", "elements": [{"kind": "text", "id": "w", "label": "Wen müsstest du absichern?"}, {"kind": "select", "id": "sel", "label": "Wen schützen?", "options": ["Mein Kind", "Partner/in", "Meine Eltern"]}, {"kind": "button", "id": "n", "label": "Weiter", "goto": "summe"}]}, {"id": "summe", "title": "Wie viel?", "elements": [{"kind": "text", "id": "s", "label": "Beispiel: 150.000 € – damit Miete/Kita weiterläuft. Du kannst das jederzeit anpassen."}, {"kind": "button", "id": "n", "label": "Was kostet das?", "goto": "preis"}]}, {"id": "preis", "title": "Dein Preis", "elements": [{"kind": "text", "id": "p", "label": "Ungefähr 9 € im Monat. Jederzeit anpassen oder pausieren. Kein Kleingedrucktes, kein Berater."}, {"kind": "button", "id": "ab", "label": "In der App abschließen (10 Min)", "goto": "fertig"}, {"kind": "button", "id": "flex", "label": "Erst anpassen/pausieren ansehen", "goto": "summe"}]}, {"id": "fertig", "title": "Fertig", "elements": [{"kind": "text", "id": "f", "label": "Geschützt. Jederzeit in der App änderbar."}]}]}</script>
<script>
(function(){
  var C = JSON.parse(document.getElementById('concept').textContent);
  document.getElementById('apptitle').textContent = C.title || 'Prototype';
  document.getElementById('appsummary').textContent = C.summary || '';
  var nav = document.getElementById('nav'), root = document.getElementById('screens');
  var state = {};
  function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');}, 1400); }
  function show(id){
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.toggle('active', s.dataset.id===id); });
    document.querySelectorAll('#nav button').forEach(function(b){ b.classList.toggle('active', b.dataset.id===id); });
  }
  (C.screens||[]).forEach(function(scr){
    var nb = document.createElement('button'); nb.textContent = scr.title || scr.id; nb.dataset.id = scr.id;
    nb.addEventListener('click', function(){ show(scr.id); }); nav.appendChild(nb);
    var sec = document.createElement('section'); sec.className='screen'; sec.dataset.id = scr.id;
    var h = document.createElement('h2'); h.textContent = scr.title || scr.id; sec.appendChild(h);
    (scr.elements||[]).forEach(function(el){
      var wrap = document.createElement('div'); wrap.className='el';
      if(el.kind==='text'){ var p=document.createElement('p'); p.textContent=el.label||''; wrap.appendChild(p); }
      else if(el.kind==='input'){ var l=document.createElement('label'); l.textContent=el.label||el.id; var inp=document.createElement('input'); inp.id=el.id; inp.setAttribute('aria-label', el.label||el.id); inp.addEventListener('input', function(){ state[el.id]=inp.value; }); wrap.appendChild(l); wrap.appendChild(inp); }
      else if(el.kind==='select'){ var l2=document.createElement('label'); l2.textContent=el.label||el.id; var sel=document.createElement('select'); sel.id=el.id; sel.setAttribute('aria-label', el.label||el.id); (el.options||[]).forEach(function(o){ var op=document.createElement('option'); op.value=o; op.textContent=o; sel.appendChild(op); }); sel.addEventListener('change', function(){ state[el.id]=sel.value; }); wrap.appendChild(l2); wrap.appendChild(sel); }
      else if(el.kind==='link'){ var a=document.createElement('a'); a.href='#'; a.textContent=el.label||el.id; if(el.goto){ a.addEventListener('click', function(e){ e.preventDefault(); show(el.goto); }); } wrap.appendChild(a); }
      else { var btn=document.createElement('button'); btn.textContent=el.label||el.id; if(el.goto){ btn.dataset.goto=el.goto; btn.addEventListener('click', function(){ show(el.goto); }); } else { btn.addEventListener('click', function(){ toast((el.label||'Done')+' ✓'); }); } wrap.appendChild(btn); }
      sec.appendChild(wrap);
    });
    root.appendChild(sec);
  });
  show(C.start || ((C.screens||[])[0]||{}).id);
})();
</script>
</body>
</html>
