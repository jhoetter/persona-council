<body>
<header><h1 id="apptitle">Kurz ehrlich: Was ist für dich GERADE wirklich wichtig?</h1><div class="sub" id="appsummary">Nach dem KFZ-Abschluss · kein Verkauf, kein Abschluss, kein Rückruf · HUK verdient hieran nichts</div></header>

<script id="concept" type="application/json">{"title": "Kurz ehrlich: Was ist für dich GERADE wirklich wichtig?", "summary": "Nach dem KFZ-Abschluss · kein Verkauf, kein Abschluss, kein Rückruf · HUK verdient hieran nichts", "start": "intro", "screens": [{"id": "intro", "title": "Auto geregelt. Kurz was Ehrliches?", "elements": [{"id": "intro_t1", "kind": "text", "label": "Deine KFZ-Versicherung ist abgeschlossen — fertig, nichts weiter nötig."}, {"id": "intro_t2", "kind": "text", "label": "Wir nutzen den Moment NICHT, um dir noch etwas zu verkaufen. Stattdessen: 2 Minuten, 5 ehrliche Fragen — was ist bei dir GERADE wirklich dran? Danach sagen wir dir geradeheraus, was für dich heute Sinn macht und was NICHT."}, {"id": "intro_t3", "kind": "text", "label": "Transparenz: An diesem Check verdient die HUK keinen Cent. Kein Abschluss, kein Anruf, kein Berater meldet sich."}, {"id": "intro_go", "kind": "button", "label": "Okay, 2 Minuten", "goto": "q_auto", "action": "q_auto"}, {"id": "intro_skip", "kind": "button", "label": "Nein danke, schließen", "goto": "skip", "action": "skip"}]}, {"id": "q_auto", "title": "1/5 · Dein Auto", "elements": [{"id": "auto_t", "kind": "text", "label": "Wie wichtig ist dein Auto im Alltag — Job, Ausbildung, Mobilität?"}, {"id": "auto_sel", "kind": "select", "label": "Mein Auto ist...", "options": ["bitte wählen", "Brauche ich täglich, ohne geht nichts", "Wäre ärgerlich, aber ginge auch anders", "Eher Hobby / selten"]}, {"id": "auto_go", "kind": "button", "label": "Weiter", "goto": "q_miete", "action": "q_miete"}]}, {"id": "q_miete", "title": "2/5 · Wohnen", "elements": [{"id": "miete_t", "kind": "text", "label": "Wie wohnst du gerade?"}, {"id": "miete_sel", "kind": "select", "label": "Ich wohne...", "options": ["bitte wählen", "Eigene Wohnung, Miete drückt", "Noch zu Hause / WG, günstig", "Gerade zusammengezogen"]}, {"id": "miete_go", "kind": "button", "label": "Weiter", "goto": "q_job", "action": "q_job"}]}, {"id": "q_job", "title": "3/5 · nziell von dir abhängt."}, {"id": "res_t3", "kind": "text", "label": "Der echte Moment für Absicherung deiner Arbeitskraft oder deiner Liebsten kommt später — wenn jemand von dir abhängt (Kind, gemeinsamer Kredit) oder dein Einkommen DAS ist, was deine Zukunft trägt. DANN lohnt das Gespräch, nicht heute."}, {"id": "res_go", "kind": "button", "label": "Verstanden — und das ist alles?", "goto": "merker", "action": "merker"}]}, {"id": "merker", "title": "Nur wenn DU willst: Merker für später", "elements": [{"id": "merk_t1", "kind": "text", "label": "Kein Anruf, kein Newsletter, keine Lead-Liste. Wenn du magst, legst DU selbst fest, woran wir dich erinnern dürfen — und nur dann. Jederzeit löschbar."}, {"id": "merk_sel", "kind": "select", "label": "Erinnere mich (optional)...", "options": ["Gar nicht, ich melde mich selbst", "Erst wenn ich zusammenziehe", "Erst beim ersten festen Job / Verbeamtung", "Erst wenn ein Kind geplant ist"]}, {"id": "merk_go", "kind": "button", "label": "Fertig", "goto": "ende", "action": "ende"}]}, {"id": "ende", "title": "Das war's. Wirklich.", "elements": [{"id": "ende_t1", "kind": "text", "label": "Kein Haken, kein Rückruf. Dein Auto ist versichert, dein Geld bleibt bei dir, und du weißt jetzt, was heute wirklich zählt."}, {"id": "ende_t2", "kind": "text", "label": "Falls du irgendwann am echten Lebens-Moment bist: dann sind wir ehrlich für dich da. Bis dahin: nichts müssen."}]}, {"id": "skip", "title": "Alles gut.", "elements": [{"id": "skip_t", "kind": "text", "label": "Kein Problem — dein Auto ist versichert, mehr braucht es gerade nicht. Schönen Tag."}]}]}</script>
<script>
(function(){
  var C = JSON.parse(document.getElementById('concept').textContent);
  document.getElementById('apptitle').textContent = C.title || 'Prototype';
  document.getElementById('appsummary').textContent = C.summary || '';
  var nav = document.getElementById('nav'), root = document.getElementById('screens');
  var state = {};
  function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');}, 1400); }
  function show(id){
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.toggle('active', s.dataset.id===id); });
    document.querySelectorAll('#nav button').forEach(function(b){ b.classList.toggle('active', b.dataset.id===id); });
  }
  (C.screens||[]).forEach(function(scr){
    var nb = document.createElement('button'); nb.textContent = scr.title || scr.id; nb.dataset.id = scr.id;
    nb.addEventListener('click', function(){ show(scr.id); }); nav.appendChild(nb);
    var sec = document.createElement('section'); sec.className='screen'; sec.dataset.id = scr.id;
    var h = document.createElement('h2'); h.textContent = scr.title || scr.id; sec.appendChild(h);
    (scr.elements||[]).forEach(function(el){
      var wrap = document.createElement('div'); wrap.className='el';
      if(el.kind==='text'){ var p=document.createElement('p'); p.textContent=el.label||''; wrap.appendChild(p); }
      else if(el.kind==='input'){ var l=document.createElement('label'); l.textContent=el.label||el.id; var inp=document.createElement('input'); inp.id=el.id; inp.setAttribute('aria-label', el.label||el.id); inp.addEventListener('input', function(){ state[el.id]=inp.value; }); wrap.appendChild(l); wrap.appendChild(inp); }
      else if(el.kind==='select'){ var l2=document.createElement('label'); l2.textContent=el.label||el.id; var sel=document.createElement('select'); sel.id=el.id; sel.setAttribute('aria-label', el.label||el.id); (el.options||[]).forEach(function(o){ var op=document.createElement('option'); op.value=o; op.textContent=o; sel.appendChild(op); }); sel.addEventListener('change', function(){ state[el.id]=sel.value; }); wrap.appendChild(l2); wrap.appendChild(sel); }
      else if(el.kind==='link'){ var a=document.createElement('a'); a.href='#'; a.textContent=el.label||el.id; if(el.goto){ a.addEventListener('click', function(e){ e.preventDefault(); show(el.goto); }); } wrap.appendChild(a); }
      else { var btn=document.createElement('button'); btn.textContent=el.label||el.id; if(el.goto){ btn.dataset.goto=el.goto; btn.addEventListener('click', function(){ show(el.goto); }); } else { btn.addEventListener('click', function(){ toast((el.label||'Done')+' ✓'); }); } wrap.appendChild(btn); }
      sec.appendChild(wrap);
    });
    root.appendChild(sec);
  });
  show(C.start || ((C.screens||[])[0]||{}).id);
})();
</script>
</body>
