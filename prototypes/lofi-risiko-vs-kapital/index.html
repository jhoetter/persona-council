<title>Risiko vs. Kapital, in deinen Worten</title>
<style>
  *{box-sizing:border-box}
  :root{--bg:#f6f7f9;--panel:#fff;--ink:#1c1e21;--muted:#697077;--line:#e6e8eb;--accent:#5b6cff;--accent-ink:#fff;--r:10px;--sh:0 1px 2px rgba(16,18,28,.06);--ff:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  body[data-fidelity=lofi]{--panel:#fffef9;--line:#cfcabb;--ink:#2b2b2b;--muted:#7a756a;--accent:#5f6368;--r:14px;--sh:none;--ff:"Comic Sans MS","Segoe Print","Bradley Hand",cursive}
  body[data-fidelity=hifi]{--bg:#fbfbfd;--panel:#fff;--ink:#0c0d12;--muted:#6b7280;--line:#ececf1;--accent:#5e6ad2;--r:8px;--sh:0 1px 3px rgba(16,18,40,.08),0 0 0 1px rgba(16,18,40,.03);--ff:Inter,-apple-system,Segoe UI,Roboto,sans-serif}
  body{margin:0;font:15px/1.5 var(--ff);color:var(--ink);background:var(--bg)}
  body[data-fidelity=lofi] .col,body[data-fidelity=lofi] .el input,body[data-fidelity=lofi] .el select{border-style:dashed}
  #lofi-banner{display:none}
  body[data-fidelity=lofi] #lofi-banner{display:block;background:#fff3cd;color:#7a5b00;text-align:center;padding:5px;font-size:12px;border-bottom:1px dashed #cfcabb}
  header{padding:16px 22px;background:var(--panel);border-bottom:1px solid var(--line)}
  h1{font-size:18px;margin:0}.sub{color:var(--muted);font-size:13px;margin-top:2px}
  nav{display:flex;gap:6px;flex-wrap:wrap;padding:10px 22px;background:var(--panel);border-bottom:1px solid var(--line)}
  nav button{font:inherit;border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:5px 11px;cursor:pointer;color:var(--ink)}
  nav button.active{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  main{max-width:980px;margin:0 auto;padding:22px}
  .screen{display:none}.screen.active{display:block}
  .screen h2{font-size:17px;margin:0 0 14px}
  .cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:0 0 18px;align-items:start}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:0;overflow:hidden;display:flex;flex-direction:column}
  .col.highlight{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),var(--sh)}
  .col .chead{padding:14px 16px;border-bottom:1px solid var(--line)}
  .col .ctitle{font-weight:700;font-size:15px}.col .cbadge{display:inline-block;margin-top:5px;font-size:11px;color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);padding:2px 8px;border-radius:999px}
  .col .row{display:flex;justify-content:space-between;gap:10px;padding:9px 16px;border-bottom:1px solid var(--line);font-size:14px}
  .col .row:last-of-type{border-bottom:none}.col .row .rl{color:var(--muted)}.col .row .rv{font-weight:600;text-align:right}
  .col .cfoot{padding:12px 16px;margin-top:auto}
  .el{margin:0 0 14px}.el label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
  .el input,.el select{font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:var(--r);width:100%;max-width:380px;background:var(--bg);color:var(--ink)}
  .el p{margin:0;max-width:62ch}.el a{color:var(--accent)}
  .btn{font:inherit;border:1px solid transparent;background:var(--accent);color:var(--accent-ink);border-radius:var(--r);padding:8px 14px;cursor:pointer;width:100%;box-shadow:var(--sh)}
  .btn.secondary{background:var(--panel);color:var(--ink);border-color:var(--line)}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .15s;pointer-events:none}#toast.show{opacity:.95}
</style>
</head>
<body>
<div id="lofi-banner">Lo-Fi · zum Testen, nicht final</div>
<header><h1 id="apptitle">Risiko vs. Kapital, in deinen Worten</h1><div class="sub" id="appsummary">Das Wort "Lebensversicherung" meint zwei voellig verschiedene Dinge. Hier siehst du beide nebeneinander - ohne Fachsprache, ohne Empfehlung. Du entscheidest selbst, was du brauchst.</div></header>
<nav id="nav"></nav>
<main id="screens"></main>
<div id="toast"></div>
<script id="concept" type="application/json">{"title": "Risiko vs. Kapital, in deinen Worten", "summary": "Das Wort \"Lebensversicherung\" meint zwei voellig verschiedene Dinge. Hier siehst du beide nebeneinander - ohne Fachsprache, ohne Empfehlung. Du entscheidest selbst, was du brauchst.", "fidelity": "lofi", "start": "vergleich", "screens": [{"id": "vergleich", "title": "Zwei Dinge, ein Wort", "columns": [{"id": "risiko", "title": "Risiko-LV", "badge": "Nur Schutz", "highlight": false, "rows": [{"label": "Was ist das?", "value": "Reiner Schutz - kein Sparen"}, {"label": "Wofuer?", "value": "Geld fuer die, die von dir leben"}, {"label": "Was kostet das?", "value": "Wenig - oft ein paar Euro/Monat"}, {"label": "Wie lange gebunden?", "value": "Flexibel kuendbar"}, {"label": "Fuer wen?", "value": "Familien, Paare mit Krediten, Allein-verdiener:innen"}], "cta": {"id": "mehr-risiko", "label": "Risiko-LV: einfach erklaert", "variant": "secondary", "goto": "risiko-detail"}}, {"id": "kapital", "title": "Kapital-LV", "badge": "Sparen + Schutz", "highlight": false, "rows": [{"label": "Was ist das?", "value": "Sparen UND Schutz gemischt"}, {"label": "Wofuer?", "value": "Geld ansparen + absichern in einem"}, {"label": "Was kostet das?", "value": "Viel - oft hohe dreistellige Betraege/Monat"}, {"label": "Wie lange gebunden?", "value": "Jahrzehnte - frueh kuendigen = Verlust"}, {"label": "Fuer wen?", "value": "Wer Sparen+Schutz bewusst koppeln will"}], "cta": {"id": "mehr-kapital", "label": "Kapital-LV: einfach erklaert", "variant": "secondary", "goto": "kapital-detail"}}], "elements": [{"id": "intro-text", "kind": "text", "label": "\"Lebensversicherung\" ist nur ein Sammelwort. Links: guenstiger Schutz fuer den Notfall deiner Familie. Rechts: teures Sparprodukt mit Schutz drin. Es gibt kein \"besser\" - es kommt darauf an, was DU brauchst."}, {"id": "btn-unterschied", "kind": "button", "label": "Was ist der Unterschied? (antippen)", "goto": "unterschied"}]}, {"id": "unterschied", "title": "Was ist der Unterschied?", "elements": [{"id": "u1", "kind": "text", "label": "Beide heissen \"Lebensversicherung\" - aber sie tun nicht dasselbe."}, {"id": "u2", "kind": "text", "label": "Risiko-LV = nur Schutz. Guenstig. Fuer den Fall, dass dir etwas zustoesst und deine Familie sonst ohne dein Einkommen dasteht. Du sparst dabei nichts - es ist ein Sicherheitsnetz, kein Sparschwein."}, {"id": "u3", "kind": "text", "label": "Kapital-LV = Schutz UND Sparen in einem. Teuer und ueber sehr lange Zeit gebunden. Ein grosser Teil geht in Sparanteil und Gebuehren. Wer frueh kuendigt, bekommt oft weniger zurueck als eingezahlt."}, {"id": "u4", "kind": "text", "label": "Wenn andere von deinem Einkommen leben, ist der Schutzgedanke (Risiko-LV) meist das Erste, worueber man nachdenkt. Sparen kann man auch getrennt - das ist oft flexibler und guenstiger."}, {"id": "back-from-unterschied", "kind": "button", "label": "Zurueck zum Vergleich", "variant": "secondary", "goto": "vergleich"}]}, {"id": "risiko-detail", "title": "Risiko-LV: einfach erklaert", "elements": [{"id": "r1", "kind": "text", "label": "Stell dir vor: Du zahlst einen kleinen Beitrag im Monat. Solange alles gut ist, passiert nichts."}, {"id": "r2", "kind": "text", "label": "Faellt dein Einkommen weg, weil dir etwas zustoesst, bekommen die Menschen Geld, die auf dich angewiesen sind - Partner:in, Kinder. Sonst nichts. Kein Sparen."}, {"id": "r3", "kind": "text", "label": "Weil kein Geld angespart wird, ist der Beitrag niedrig. Du zahlst nur fuer den Schutz. Und: in schlechten Monaten lassen sich solche Vertraege oft flexibel anpassen oder kuendigen."}, {"id": "r4", "kind": "text", "label": "Wenn niemand finanziell von dir abhaengt, brauchst du das oft gar nicht. Wenn doch, ist es meist das Wichtigste zuerst."}, {"id": "back-from-risiko", "kind": "button", "label": "Zurueck zum Vergleich", "variant": "secondary", "goto": "vergleich"}]}, {"id": "kapital-detail", "title": "Kapital-LV: einfach erklaert", "elements": [{"id": "k1", "kind": "text", "label": "Eine Mischung: Ein Teil deines Beitrags geht in den Schutz, ein Teil wird gespart/angelegt. Du bekommst spaeter eine Summe ausgezahlt."}, {"id": "k2", "kind": "text", "label": "Klingt praktisch, ist aber teuer: ein grosser Teil geht in Gebuehren. Das Sparen ist oft weniger ertragreich als getrennte Loesungen, und die Kosten sind schwer zu durchschauen."}, {"id": "k3", "kind": "text", "label": "Du bist ueber Jahrzehnte gebunden. Wer frueh kuendigt, bekommt oft deutlich weniger zurueck, als er eingezahlt hat - schlecht bei schwankendem Einkommen."}, {"id": "k4", "kind": "text", "label": "Viele trennen heute lieber: guenstiger Schutz (Risiko-LV) plus separat sparen/anlegen. Flexibler und oft guenstiger."}, {"id": "back-from-kapital", "kind": "button", "label": "Zurueck zum Vergleich", "variant": "secondary", "goto": "vergleich"}]}]}</script>
<script>
(function(){
  var C = JSON.parse(document.getElementById('concept').textContent);
  document.body.dataset.fidelity = C.fidelity || 'midfi';
  document.getElementById('apptitle').textContent = C.title || 'Prototype';
  document.getElementById('appsummary').textContent = C.summary || '';
  var nav=document.getElementById('nav'), root=document.getElementById('screens'), state={};
  function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1400);}
  function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.toggle('active',s.dataset.id===id);});document.querySelectorAll('#nav button').forEach(function(b){b.classList.toggle('active',b.dataset.id===id);});}
  function actBtn(spec){var b=document.createElement('button');b.className='btn'+(spec.variant==='secondary'?' secondary':'');b.id=spec.id;b.textContent=spec.label||spec.id;b.setAttribute('aria-label',spec.label||spec.id);if(spec.goto){b.addEventListener('click',function(){show(spec.goto);});}else{b.addEventListener('click',function(){toast((spec.label||'OK')+' ✓');});}return b;}
  function renderEl(el){
    var wrap=document.createElement('div');wrap.className='el';
    if(el.kind==='text'){var p=document.createElement('p');p.textContent=el.label||'';wrap.appendChild(p);}
    else if(el.kind==='input'){var l=document.createElement('label');l.textContent=el.label||el.id;var inp=document.createElement('input');inp.id=el.id;inp.setAttribute('aria-label',el.label||el.id);inp.addEventListener('input',function(){state[el.id]=inp.value;});wrap.appendChild(l);wrap.appendChild(inp);}
    else if(el.kind==='select'){var l2=document.createElement('label');l2.textContent=el.label||el.id;var sel=document.createElement('select');sel.id=el.id;sel.setAttribute('aria-label',el.label||el.id);(el.options||[]).forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;sel.appendChild(op);});sel.addEventListener('change',function(){state[el.id]=sel.value;});wrap.appendChild(l2);wrap.appendChild(sel);}
    else if(el.kind==='link'){var a=document.createElement('a');a.href='#';a.id=el.id;a.textContent=el.label||el.id;a.setAttribute('aria-label',el.label||el.id);if(el.goto){a.addEventListener('click',function(e){e.preventDefault();show(el.goto);});}wrap.appendChild(a);}
    else {wrap.appendChild(actBtn(el));}
    return wrap;
  }
  (C.screens||[]).forEach(function(scr){
    var nb=document.createElement('button');nb.textContent=scr.title||scr.id;nb.dataset.id=scr.id;nb.addEventListener('click',function(){show(scr.id);});nav.appendChild(nb);
    var sec=document.createElement('section');sec.className='screen';sec.dataset.id=scr.id;
    var h=document.createElement('h2');h.textContent=scr.title||scr.id;sec.appendChild(h);
    if((scr.columns||[]).length){var cols=document.createElement('div');cols.className='cols';scr.columns.forEach(function(col){
      var c=document.createElement('div');c.className='col'+(col.highlight?' highlight':'');if(col.id){c.id=col.id;}c.setAttribute('aria-label',col.title||col.id||'option');
      var head=document.createElement('div');head.className='chead';var ti=document.createElement('div');ti.className='ctitle';ti.textContent=col.title||'';head.appendChild(ti);if(col.badge){var bd=document.createElement('span');bd.className='cbadge';bd.textContent=col.badge;head.appendChild(bd);}c.appendChild(head);
      (col.rows||[]).forEach(function(r){var row=document.createElement('div');row.className='row';var rl=document.createElement('span');rl.className='rl';rl.textContent=r.label||'';var rv=document.createElement('span');rv.className='rv';rv.textContent=r.value||'';row.appendChild(rl);row.appendChild(rv);c.appendChild(row);});
      if(col.cta){var f=document.createElement('div');f.className='cfoot';f.appendChild(actBtn(col.cta));c.appendChild(f);}
      cols.appendChild(c);
    });sec.appendChild(cols);}
    (scr.elements||[]).forEach(function(el){sec.appendChild(renderEl(el));});
    root.appendChild(sec);
  });
  show(C.start || ((C.screens||[])[0]||{}).id);
})();
</script>
</body>
</html>
