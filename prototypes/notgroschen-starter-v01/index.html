<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notgroschen-Starter</title>
<style>body{font:15px/1.5 system-ui,sans-serif;max-width:520px;margin:0 auto;padding:28px;color:#1a1c1f}
h1{font-size:21px;margin:0 0 4px}.sub{color:#6b7076;margin:0 0 20px}
.card{border:1px solid #ececed;border-radius:10px;padding:18px;margin:14px 0}
label{display:block;font-weight:600;margin:0 0 6px}input{width:100%;padding:8px;border:1px solid #d8d8da;border-radius:7px;font:inherit}
.big{font-size:28px;font-weight:720;margin:6px 0}.muted{color:#6b7076;font-size:13px}
button{background:#3d7b5f;color:#fff;border:0;border-radius:8px;padding:10px 16px;font:inherit;font-weight:600;cursor:pointer;margin-top:8px}
.honest{background:#f3faf6;border:1px solid #cfe9db;border-radius:8px;padding:10px 12px;font-size:13px;color:#2f6f5f;margin-top:14px}</style></head>
<body>
<h1>Notgroschen-Starter</h1>
<p class="sub">Kleiner Puffer, ein Schritt. Kein Verkauf, kein Konto-Wechsel.</p>
<div class="card">
  <label for="m">Was kannst du pro Woche entbehren? (€)</label>
  <input id="m" type="number" value="5" min="0">
  <div class="big" id="out">260 € in 12 Monaten</div>
  <div class="muted">Plus Aufrundungen beim Bezahlen — im Schnitt ~3 €/Woche extra.</div>
  <button onclick="document.getElementById('out').textContent=((+document.getElementById('m').value+3)*52).toFixed(0)+' € in 12 Monaten'">Neu berechnen</button>
  <div class="honest">An diesem Rechner verdienen wir nichts. Dein Geld bleibt auf deinem Konto.</div>
</div>
</body></html>
