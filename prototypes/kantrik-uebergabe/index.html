<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kantrik · Übergabe-Check (Prototyp v0.1)</title>
<style>
  :root{--ink:#1c1e21;--muted:#6b7177;--line:#e7e7e3;--panel:#fff;--bg:#f7f7f5;
        --add:#3d7b5f;--del:#b3493f;--chg:#a66b1f;--accent:#2f6f9f;}
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg)}
  header{padding:18px 24px;background:var(--panel);border-bottom:1px solid var(--line)}
  h1{font-size:19px;margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px}
  main{max-width:920px;margin:0 auto;padding:22px 24px 60px}
  .scopebar{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}
  .chip{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:3px 11px;background:var(--panel)}
  .chip.ok::before{content:"✓ ";color:var(--add)}
  .chip.no{color:var(--muted)}
  .chip.no::before{content:"○ ";}
  .row{display:flex;gap:14px;align-items:center;margin:0 0 14px;flex-wrap:wrap}
  .row label{font-size:13px;color:var(--muted)}
  button{font:inherit;border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:7px 13px;cursor:pointer;color:var(--ink)}
  button.primary{background:var(--accent);color:#fff;border-color:transparent}
  button:hover{filter:brightness(.97)}
  .summary{display:flex;gap:18px;margin:6px 0 16px;font-size:13px;color:var(--muted)}
  .summary b{font-size:22px;display:block;color:var(--ink)}
  .grp{background:var(--panel);border:1px solid var(--line);border-radius:11px;margin:0 0 14px;overflow:hidden}
  .grp>h2{font-size:13.5px;margin:0;padding:11px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%}
  .item{padding:11px 15px;border-bottom:1px solid #f1f1ee}
  .item:last-child{border-bottom:0}
  .item .id{font-weight:600}
  .item .meta{font-size:12.5px;color:var(--muted)}
  .delta{font-size:13px;margin-top:3px}
  .delta .o{color:var(--del);text-decoration:line-through;opacity:.8}
  .delta .n{color:var(--add);font-weight:600}
  .none{color:var(--muted);padding:11px 15px;font-size:13px}
  .proto{background:#fffdf6;border:1px solid #ece2c4;border-radius:11px;padding:16px 18px;margin-top:8px;white-space:pre-wrap;font:13px/1.6 ui-monospace,Menlo,Consolas,monospace}
  .warn{font-size:12.5px;color:var(--muted);margin-top:6px}
  .filebtns{display:flex;gap:10px;flex-wrap:wrap}
  .stale{background:#fdeceb;border:1px solid #f3c9c5;border-radius:9px;padding:9px 13px;font-size:13px;margin:0 0 16px;color:#7a2e27;display:none}
</style>
</head>
<body>
<header>
  <h1>kantrik · Übergabe-Check <span class="sub">Prototyp v0.1 — lokal, kein Upload</span></h1>
  <div class="sub">Was hat sich seit dem letzten offiziell übergebenen Stand geändert? — verlässlich auf den tragenden Elementen.</div>
</header>
<main>
  <div class="scopebar">
    <span class="chip ok">Geprüft: Stützen</span>
    <span class="chip ok">tragende Wände</span>
    <span class="chip ok">Decken</span>
    <span class="chip ok">Aussparungen</span>
    <span class="chip no">Ungeprüft: Möblierung, Bodenbeläge, Beschriftung (nicht tragend)</span>
  </div>

  <div class="row">
    <label>Stand A (zuletzt übergeben)</label>
    <div class="filebtns">
      <button id="loadDemo" class="primary">Demo laden (v2 → v3)</button>
      <label style="cursor:pointer"><input id="fa" type="file" accept=".json" hidden> A wählen…</label>
      <label style="cursor:pointer"><input id="fb" type="file" accept=".json" hidden> B (neu) wählen…</label>
    </div>
  </div>

  <div id="stale" class="stale"></div>

  <div class="summary" id="summary"></div>
  <div id="out"></div>

  <div class="row" style="margin-top:8px">
    <button id="genProto">Übergabe-Protokoll erzeugen</button>
    <button id="printProto" hidden>Drucken / als PDF speichern</button>
  </div>
  <div id="proto"></div>
</main>

<script>
// --- Demo-Stände: kleines Tragwerk, EG. v2 = zuletzt übergeben, v3 = neuer Stand. ---
// Bewusst eingebaut: eine STILL verschobene Stütze + eine geänderte Deckenstärke + neue Aussparung.
const SCOPE = ["Stütze","Wand (tragend)","Decke","Aussparung"];
const stateV2 = { name:"Stand v2 (übergeben 2026-05-12)", elements:[
  {id:"ST-01", typ:"Stütze",        geschoss:"EG", pos:"x=4.00 y=6.00", mass:"30/30 cm"},
  {id:"ST-02", typ:"Stütze",        geschoss:"EG", pos:"x=8.00 y=6.00", mass:"30/30 cm"},
  {id:"W-11",  typ:"Wand (tragend)",geschoss:"EG", pos:"Achse B",       mass:"d=24 cm"},
  {id:"W-12",  typ:"Wand (tragend)",geschoss:"EG", pos:"Achse C",       mass:"d=24 cm"},
  {id:"DE-1",  typ:"Decke",         geschoss:"Decke ü. EG", pos:"Feld 1", mass:"d=25 cm"},
  {id:"MO-3",  typ:"Möblierung",    geschoss:"EG", pos:"Büro 2",        mass:"Schrank"}
]};
const stateV3 = { name:"Stand v3 (neu 2026-06-02)", elements:[
  {id:"ST-01", typ:"Stütze",        geschoss:"EG", pos:"x=4.20 y=6.00", mass:"30/30 cm"},   // STILL verschoben +20cm
  {id:"ST-02", typ:"Stütze",        geschoss:"EG", pos:"x=8.00 y=6.00", mass:"30/30 cm"},
  {id:"W-11",  typ:"Wand (tragend)",geschoss:"EG", pos:"Achse B",       mass:"d=24 cm"},
  // W-12 ENTFERNT
  {id:"DE-1",  typ:"Decke",         geschoss:"Decke ü. EG", pos:"Feld 1", mass:"d=30 cm"},   // Deckenstärke 25->30
  {id:"AUS-7", typ:"Aussparung",    geschoss:"Decke ü. EG", pos:"x=5.0 y=6.0", mass:"20x20 cm"}, // NEU
  {id:"MO-3",  typ:"Möblierung",    geschoss:"EG", pos:"Büro 3",        mass:"Schrank"}        // außerhalb Scope
]};

let A=null, B=null;

function inScope(el){ return SCOPE.includes(el.typ); }
function key(el){ return el.id; }

// 100% deterministischer Abgleich auf dem Scope — kein fuzzy/AI.
function diff(a, b){
  const am = new Map(a.elements.filter(inScope).map(e=>[key(e),e]));
  const bm = new Map(b.elements.filter(inScope).map(e=>[key(e),e]));
  const added=[], removed=[], changed=[];
  for(const [k,e] of bm){ if(!am.has(k)) added.push(e); }
  for(const [k,e] of am){ if(!bm.has(k)) removed.push(e); }
  for(const [k,eb] of bm){ const ea=am.get(k); if(!ea) continue;
    const fields=[]; for(const f of ["pos","mass","geschoss"]){ if(ea[f]!==eb[f]) fields.push({f,o:ea[f],n:eb[f]}); }
    if(fields.length) changed.push({el:eb, fields});
  }
  const ignored = b.elements.filter(e=>!inScope(e)).length + a.elements.filter(e=>!inScope(e)).length;
  return {added, removed, changed, ignored};
}

function render(){
  if(!A||!B){ return; }
  const d = diff(A,B);
  document.getElementById("summary").innerHTML =
    `<div><b>${d.added.length}</b> hinzugefügt</div><div><b>${d.removed.length}</b> entfernt</div>`+
    `<div><b>${d.changed.length}</b> geändert</div><div><b>${d.ignored}</b> außerhalb Scope (ungeprüft)</div>`;
  const fmt = arr=>arr.length;
  let html="";
  const grp=(title,color,inner)=>`<div class="grp"><h2><span class="dot" style="background:${color}"></span>${title}</h2>${inner||'<div class="none">— keine —</div>'}</div>`;
  html += grp(`Geändert (${d.changed.length})`, "var(--chg)", d.changed.map(c=>
     `<div class="item"><span class="id">${c.el.id}</span> · <span class="meta">${c.el.typ}, ${c.el.geschoss}</span>`+
     c.fields.map(f=>`<div class="delta">${f.f==='pos'?'Position':f.f==='mass'?'Maß':'Geschoss'}: <span class="o">${f.o}</span> → <span class="n">${f.n}</span></div>`).join("")+
     `</div>`).join(""));
  html += grp(`Hinzugefügt (${d.added.length})`, "var(--add)", d.added.map(e=>
     `<div class="item"><span class="id">${e.id}</span> · <span class="meta">${e.typ}, ${e.geschoss}, ${e.pos}, ${e.mass}</span></div>`).join(""));
  html += grp(`Entfernt (${d.removed.length})`, "var(--del)", d.removed.map(e=>
     `<div class="item"><span class="id">${e.id}</span> · <span class="meta">${e.typ}, ${e.geschoss}, ${e.pos}, ${e.mass}</span></div>`).join(""));
  document.getElementById("out").innerHTML = html;
  document.getElementById("proto").innerHTML = "";
  document.getElementById("printProto").hidden = true;
  // Vertrauens-Hinweis: ehrlich begrenzter Scope
  const st=document.getElementById("stale");
  st.style.display="block";
  st.textContent = `Hinweis: Geprüft wurden nur tragende Elemente (${SCOPE.join(", ")}). ${d.ignored} nicht-tragende Elemente wurden bewusst NICHT geprüft und sind oben als „außerhalb Scope“ ausgewiesen — keine falsche Vollständigkeit.`;
}

function genProto(){
  if(!A||!B) return;
  const d = diff(A,B);
  const now = new Date().toISOString().slice(0,16).replace("T"," ");
  const lines = [];
  lines.push("ÜBERGABE-PROTOKOLL (Stands-/Änderungsnachweis)");
  lines.push("Erzeugt: "+now+"   ·   lokal, ohne Upload");
  lines.push("Von Stand: "+A.name);
  lines.push("Auf Stand: "+B.name);
  lines.push("Geprüfter Umfang: "+SCOPE.join(", "));
  lines.push("");
  lines.push(`Geändert (${d.changed.length}):`);
  d.changed.forEach(c=>c.fields.forEach(f=>lines.push(`  - ${c.el.id} (${c.el.typ}): ${f.f} ${f.o} -> ${f.n}`)));
  lines.push(`Hinzugefügt (${d.added.length}):`);
  d.added.forEach(e=>lines.push(`  + ${e.id} (${e.typ}, ${e.geschoss}, ${e.pos}, ${e.mass})`));
  lines.push(`Entfernt (${d.removed.length}):`);
  d.removed.forEach(e=>lines.push(`  x ${e.id} (${e.typ}, ${e.geschoss})`));
  lines.push("");
  lines.push(`Nicht geprüft (außerhalb Scope): ${d.ignored} nicht-tragende Elemente.`);
  lines.push("Bestätigt durch: ____________________   Datum: __________");
  document.getElementById("proto").innerHTML = `<div class="proto">${lines.join("\n")}</div>`+
    `<div class="warn">Dieses Protokoll ist als belastbarer Nachweis gedacht: was wurde wann von welchem Stand auf welchen übergeben, und was hat sich auf dem geprüften Umfang geändert.</div>`;
  document.getElementById("printProto").hidden = false;
}

document.getElementById("loadDemo").onclick = ()=>{ A=stateV2; B=stateV3; render(); };
function readFile(input, set){ input.onchange=e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ set(JSON.parse(r.result)); render(); }catch(_){ alert("Konnte JSON nicht lesen."); } }; r.readAsText(f); }; }
readFile(document.getElementById("fa"), v=>A=v);
readFile(document.getElementById("fb"), v=>B=v);
document.getElementById("genProto").onclick = genProto;
document.getElementById("printProto").onclick = ()=>window.print();
</script>
</body>
</html>
