<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nach dem Auto: dein ehrlicher Kassensturz</title>
<style>
  *{box-sizing:border-box}
  :root{--bg:#f6f7f9;--panel:#fff;--ink:#1c1e21;--muted:#697077;--line:#e6e8eb;--accent:#5b6cff;--accent-ink:#fff;--ok:#1f9d57;--warn:#d98300;--r:10px;--sh:0 1px 2px rgba(16,18,28,.06);--ff:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  body[data-fidelity=lofi]{--panel:#fffef9;--line:#cfcabb;--ink:#2b2b2b;--muted:#7a756a;--accent:#5f6368;--r:14px;--sh:none;--ff:"Comic Sans MS","Segoe Print","Bradley Hand",cursive}
  body[data-fidelity=hifi]{--bg:#fbfbfd;--panel:#fff;--ink:#0c0d12;--muted:#6b7280;--line:#ececf1;--accent:#5e6ad2;--r:8px;--sh:0 1px 3px rgba(16,18,40,.08),0 0 0 1px rgba(16,18,40,.03);--ff:Inter,-apple-system,Segoe UI,Roboto,sans-serif}
  body{margin:0;font:15px/1.5 var(--ff);color:var(--ink);background:var(--bg)}
  body[data-fidelity=lofi] .tile,body[data-fidelity=lofi] .card,body[data-fidelity=lofi] .el input,body[data-fidelity=lofi] .el select{border-style:dashed}
  #lofi-banner{display:none}
  body[data-fidelity=lofi] #lofi-banner{display:block;background:#fff3cd;color:#7a5b00;text-align:center;padding:5px;font-size:12px;border-bottom:1px dashed #cfcabb}
  header{padding:16px 22px;background:var(--panel);border-bottom:1px solid var(--line)}
  h1{font-size:18px;margin:0}.sub{color:var(--muted);font-size:13px;margin-top:2px}
  nav{display:flex;gap:6px;flex-wrap:wrap;padding:10px 22px;background:var(--panel);border-bottom:1px solid var(--line)}
  nav button{font:inherit;border:1px solid var(--line);background:var(--panel);border-radius:7px;padding:5px 11px;cursor:pointer;color:var(--ink)}
  nav button.active{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  main{max-width:980px;margin:0 auto;padding:22px}
  .screen{display:none}.screen.active{display:block}
  .screen h2{font-size:17px;margin:0 0 14px}
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:0 0 18px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:15px 16px}
  .tile .tlabel{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .tile .tval{font-size:26px;font-weight:700;margin-top:6px;line-height:1.1}
  .tile .tdelta{font-size:12px;margin-top:5px;color:var(--muted)}
  .tile .tdelta.up{color:var(--ok)}.tile .tdelta.down{color:var(--warn)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin:0 0 18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:16px;display:flex;flex-direction:column;gap:8px}
  .card h3{margin:0;font-size:15px}.card p{margin:0;color:var(--muted);font-size:14px}
  .el{margin:0 0 14px}.el label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
  .el input,.el select{font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:var(--r);width:100%;max-width:380px;background:var(--bg);color:var(--ink)}
  .el p{margin:0;max-width:62ch}.el a{color:var(--accent)}
  .btn{font:inherit;border:1px solid transparent;background:var(--accent);color:var(--accent-ink);border-radius:var(--r);padding:8px 14px;cursor:pointer;align-self:flex-start;box-shadow:var(--sh)}
  .btn.secondary{background:var(--panel);color:var(--ink);border-color:var(--line)}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .15s;pointer-events:none}#toast.show{opacity:.95}
</style>
</head>
<body>
<div id="lofi-banner">Lo-Fi · zum Testen, nicht final</div>
<header><h1 id="apptitle">Nach dem Auto: dein ehrlicher Kassensturz</h1><div class="sub" id="appsummary">Du hast gerade dein Auto versichert. Statt dir jetzt etwas zu verkaufen, sortieren wir ehrlich, was für dich JETZT zählt — und was (noch) nicht.</div></header>
<nav id="nav"></nav>
<main id="screens"></main>
<div id="toast"></div>
<script id="concept" type="application/json">{"title": "Nach dem Auto: dein ehrlicher Kassensturz", "summary": "Du hast gerade dein Auto versichert. Statt dir jetzt etwas zu verkaufen, sortieren wir ehrlich, was für dich JETZT zählt — und was (noch) nicht.", "fidelity": "lofi", "start": "kassensturz", "screens": [{"id": "kassensturz", "title": "Was du schon hast — und was wirklich zählt", "metrics": [{"label": "KFZ-Versicherung", "value": "✓ erledigt"}, {"label": "Gesetzl. Grundabsicherung", "value": "läuft"}, {"label": "Wichtiger als LV gerade", "value": "Notgroschen"}], "cards": [{"title": "Was dich mit 22 WIRKLICH treffen würde", "body": "Selten der Todesfall — eher: kaputtes Auto, Jobwechsel, ein Monat krank. Erst ein Notgroschen, dann Schutz. In dieser Reihenfolge.", "action": {"id": "toCheck", "label": "Zeig mir den 2-Min-Check", "goto": "check"}}, {"title": "Wir verkaufen dir hier nichts", "body": "Kein Berater ruft an, keine Police im Warenkorb. Dieser Kassensturz ist das ganze Angebot. Punkt.", "action": {"id": "warum", "label": "Warum macht ihr das?", "goto": "warum"}}, {"title": "Wann LV / BU wirklich zählt", "body": "Sobald ein Mensch von deinem Einkommen lebt — Kind, Partner:in ohne eigenes Einkommen, gemeinsamer Kredit. Vorher fast nie.", "action": {"id": "toCheck2", "label": "Hängt jemand von mir ab? →", "goto": "check"}}]}, {"id": "check", "title": "Der ehrliche 2-Minuten-Check", "cards": [{"title": "Hängt jemand finanziell an dir?", "body": "Niemand → du brauchst gerade keinen Todesfallschutz. Jemand → ein schlanker, transparenter Risikoschutz kann sinnvoll sein. Mehr nicht.", "action": {"id": "ok", "label": "Verstanden", "goto": "kassensturz"}}, {"title": "Hast du 3 Monatsausgaben gespart?", "body": "Wenn nein: das ist dein erster Schritt — nicht eine Versicherung. Ein Notgroschen schützt dich heute, jeden Monat.", "action": {"id": "ok2", "label": "Macht Sinn", "goto": "kassensturz"}}]}, {"id": "warum", "title": "Warum wir hier nichts verkaufen", "cards": [{"title": "Weil Vertrauen mehr wert ist als ein schneller Abschluss", "body": "Junge Verträge aus Druck stornieren früh — schlecht für dich UND für uns. Lieber ehrlich beim Auto bleiben und da sein, wenn sich dein Leben ändert.", "action": {"id": "back", "label": "← Zurück zum Kassensturz", "goto": "kassensturz"}}]}]}</script>
<script>
(function(){
  var C = JSON.parse(document.getElementById('concept').textContent);
  document.body.dataset.fidelity = C.fidelity || 'midfi';
  document.getElementById('apptitle').textContent = C.title || 'Prototype';
  document.getElementById('appsummary').textContent = C.summary || '';
  var nav=document.getElementById('nav'), root=document.getElementById('screens'), state={};
  function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1400);}
  function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.toggle('active',s.dataset.id===id);});document.querySelectorAll('#nav button').forEach(function(b){b.classList.toggle('active',b.dataset.id===id);});}
  function actBtn(spec){var b=document.createElement('button');b.className='btn'+(spec.variant==='secondary'?' secondary':'');b.id=spec.id;b.textContent=spec.label||spec.id;b.setAttribute('aria-label',spec.label||spec.id);if(spec.goto){b.addEventListener('click',function(){show(spec.goto);});}else{b.addEventListener('click',function(){toast((spec.label||'OK')+' ✓');});}return b;}
  function renderEl(el){
    var wrap=document.createElement('div');wrap.className='el';
    if(el.kind==='text'){var p=document.createElement('p');p.textContent=el.label||'';wrap.appendChild(p);}
    else if(el.kind==='input'){var l=document.createElement('label');l.textContent=el.label||el.id;var inp=document.createElement('input');inp.id=el.id;inp.setAttribute('aria-label',el.label||el.id);inp.addEventListener('input',function(){state[el.id]=inp.value;});wrap.appendChild(l);wrap.appendChild(inp);}
    else if(el.kind==='select'){var l2=document.createElement('label');l2.textContent=el.label||el.id;var sel=document.createElement('select');sel.id=el.id;sel.setAttribute('aria-label',el.label||el.id);(el.options||[]).forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;sel.appendChild(op);});sel.addEventListener('change',function(){state[el.id]=sel.value;});wrap.appendChild(l2);wrap.appendChild(sel);}
    else if(el.kind==='link'){var a=document.createElement('a');a.href='#';a.id=el.id;a.textContent=el.label||el.id;a.setAttribute('aria-label',el.label||el.id);if(el.goto){a.addEventListener('click',function(e){e.preventDefault();show(el.goto);});}wrap.appendChild(a);}
    else {wrap.appendChild(actBtn(el));}
    return wrap;
  }
  (C.screens||[]).forEach(function(scr){
    var nb=document.createElement('button');nb.textContent=scr.title||scr.id;nb.dataset.id=scr.id;nb.addEventListener('click',function(){show(scr.id);});nav.appendChild(nb);
    var sec=document.createElement('section');sec.className='screen';sec.dataset.id=scr.id;
    var h=document.createElement('h2');h.textContent=scr.title||scr.id;sec.appendChild(h);
    if((scr.metrics||[]).length){var tg=document.createElement('div');tg.className='tiles';scr.metrics.forEach(function(m){var t=document.createElement('div');t.className='tile';if(m.id){t.id=m.id;t.setAttribute('aria-label',m.label||m.id);}var dir=(m.trend==='up')?' up':(m.trend==='down')?' down':'';t.innerHTML='<div class="tlabel"></div><div class="tval"></div>'+(m.delta?'<div class="tdelta'+dir+'"></div>':'');t.querySelector('.tlabel').textContent=m.label||'';t.querySelector('.tval').textContent=m.value||'';if(m.delta)t.querySelector('.tdelta').textContent=m.delta;tg.appendChild(t);});sec.appendChild(tg);}
    if((scr.cards||[]).length){var cg=document.createElement('div');cg.className='cards';scr.cards.forEach(function(c){var card=document.createElement('div');card.className='card';if(c.id)card.id=c.id;var h3=document.createElement('h3');h3.textContent=c.title||'';card.appendChild(h3);if(c.body){var p=document.createElement('p');p.textContent=c.body;card.appendChild(p);}if(c.action)card.appendChild(actBtn(c.action));cg.appendChild(card);});sec.appendChild(cg);}
    (scr.elements||[]).forEach(function(el){sec.appendChild(renderEl(el));});
    root.appendChild(sec);
  });
  show(C.start || ((C.screens||[])[0]||{}).id);
})();
</script>
</body>
</html>
