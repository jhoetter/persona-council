[project]
name = "persona-council"
version = "0.1.0"
description = "Terminal-first MCP customer persona simulation and council system."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "mcp>=1.2.0",
    "python-multipart>=0.0.9",
    "python-dotenv>=1.0.0",
    "uvicorn>=0.30.0",
    "persona-icons",
]

# Shared icon library — single source of truth lives in ../persona-icons
# (mirrors how bim-website consumes ../bim-icons). The React website imports the
# TSX build; the council imports the generated Python module under py/.
[tool.uv.sources]
persona-icons = { path = "../persona-icons/py", editable = true }

[project.optional-dependencies]
# Prototype harness (spec/methodology-engine-and-prototyping.md §7): agents drive real
# apps in a headless browser. Optional — the harness degrades gracefully without it.
# Install: `make playwright` (pip install + chromium download).
prototyping = ["playwright>=1.40.0"]

[project.scripts]
persona-council = "persona_council.cli:main"
persona-council-mcp = "persona_council.mcp_server:main"
persona-council-web = "persona_council.web:main"

[dependency-groups]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["persona_council"]
