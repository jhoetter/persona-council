<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
  *{box-sizing:border-box}
  :root{--bg:#fbfbfd;--panel:#fff;--ink:#0c0d12;--muted:#6b7280;--line:#ececf1;--accent:#5e6ad2;--accent-ink:#fff;--r:8px;--sh:0 1px 3px rgba(16,18,40,.08),0 0 0 1px rgba(16,18,40,.03);--ff:Inter,-apple-system,Segoe UI,Roboto,sans-serif}
  body{margin:0;font:14.5px/1.55 var(--ff);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
  header{padding:18px 26px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  h1{font-size:18px;margin:0;font-weight:650;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px;margin-top:3px}
  nav{display:flex;gap:4px;flex-wrap:wrap;padding:8px 26px;background:var(--panel);border-bottom:1px solid var(--line)}
  nav button{font:inherit;border:1px solid transparent;background:transparent;border-radius:7px;padding:6px 12px;cursor:pointer;color:var(--muted);font-size:13.5px}
  nav button:hover{background:#f3f3f7;color:var(--ink)}
  nav button.active{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);font-weight:550}
  main{max-width:720px;margin:0 auto;padding:30px 26px}
  .screen{display:none;animation:fade .18s ease}.screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh);padding:26px}
  .screen h2{font-size:20px;margin:0 0 4px;font-weight:650;letter-spacing:-.01em}
  .lead{color:var(--muted);margin:0 0 20px}
  .el{margin:0 0 16px}.el label{display:block;font-size:12.5px;font-weight:550;color:var(--ink);margin-bottom:6px}
  .el input,.el select{font:inherit;padding:9px 12px;border:1px solid var(--line);border-radius:var(--r);width:100%;background:var(--bg);color:var(--ink);transition:border-color .12s,box-shadow .12s}
  .el input:focus,.el select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}
  .el p{margin:0;max-width:62ch;color:var(--ink)}.el a{color:var(--accent);text-decoration:none;font-weight:500}.el a:hover{text-decoration:underline}
  .el button{font:inherit;font-weight:550;border:1px solid transparent;background:var(--accent);color:var(--accent-ink);border-radius:var(--r);padding:10px 16px;cursor:pointer;box-shadow:0 1px 2px rgba(94,106,210,.35);transition:filter .12s}
  .el button:hover{filter:brightness(1.06)}
  .el button.secondary{background:var(--panel);color:var(--ink);border-color:var(--line);box-shadow:var(--sh)}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 16px;border-radius:9px;font-size:13px;opacity:0;transition:opacity .15s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.18)}#toast.show{opacity:.97}
</style>
</head>
<body>
<header><h1 id="apptitle">__TITLE__</h1><div class="sub" id="appsummary">__SUMMARY__</div></header>
<nav id="nav"></nav>
<main><div class="card" id="screens"></div></main>
<div id="toast"></div>
<script id="concept" type="application/json">__CONCEPT_JSON__</script>
<script>
(function(){
  var C = JSON.parse(document.getElementById('concept').textContent);
  document.body.dataset.fidelity = 'hifi';
  document.getElementById('apptitle').textContent = C.title || 'Prototype';
  document.getElementById('appsummary').textContent = C.summary || '';
  var nav=document.getElementById('nav'), root=document.getElementById('screens'), state={};
  function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1400);}
  function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.toggle('active',s.dataset.id===id);});document.querySelectorAll('#nav button').forEach(function(b){b.classList.toggle('active',b.dataset.id===id);});}
  (C.screens||[]).forEach(function(scr){
    var nb=document.createElement('button');nb.textContent=scr.title||scr.id;nb.dataset.id=scr.id;nb.addEventListener('click',function(){show(scr.id);});nav.appendChild(nb);
    var sec=document.createElement('section');sec.className='screen';sec.dataset.id=scr.id;
    var h=document.createElement('h2');h.textContent=scr.title||scr.id;sec.appendChild(h);
    if(scr.lead){var ld=document.createElement('p');ld.className='lead';ld.textContent=scr.lead;sec.appendChild(ld);}
    (scr.elements||[]).forEach(function(el){
      var wrap=document.createElement('div');wrap.className='el';
      if(el.kind==='text'){var p=document.createElement('p');p.textContent=el.label||'';wrap.appendChild(p);}
      else if(el.kind==='input'){var l=document.createElement('label');l.textContent=el.label||el.id;var inp=document.createElement('input');inp.id=el.id;inp.setAttribute('aria-label',el.label||el.id);if(el.placeholder)inp.placeholder=el.placeholder;inp.addEventListener('input',function(){state[el.id]=inp.value;});wrap.appendChild(l);wrap.appendChild(inp);}
      else if(el.kind==='select'){var l2=document.createElement('label');l2.textContent=el.label||el.id;var sel=document.createElement('select');sel.id=el.id;sel.setAttribute('aria-label',el.label||el.id);(el.options||[]).forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;sel.appendChild(op);});sel.addEventListener('change',function(){state[el.id]=sel.value;});wrap.appendChild(l2);wrap.appendChild(sel);}
      else if(el.kind==='link'){var a=document.createElement('a');a.href='#';a.id=el.id;a.textContent=el.label||el.id;a.setAttribute('aria-label',el.label||el.id);if(el.goto){a.addEventListener('click',function(e){e.preventDefault();show(el.goto);});}wrap.appendChild(a);}
      else {var btn=document.createElement('button');btn.className=(el.variant==='secondary'?'secondary':'');btn.id=el.id;btn.textContent=el.label||el.id;btn.setAttribute('aria-label',el.label||el.id);if(el.goto){btn.addEventListener('click',function(){show(el.goto);});}else{btn.addEventListener('click',function(){toast((el.label||'Done')+' ✓');});}wrap.appendChild(btn);}
      sec.appendChild(wrap);
    });
    root.appendChild(sec);
  });
  show(C.start || ((C.screens||[])[0]||{}).id);
})();
</script>
</body>
</html>
