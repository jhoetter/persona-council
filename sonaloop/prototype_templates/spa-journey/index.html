<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<style>
  *{box-sizing:border-box}
  :root{--bg:#f6f7f9;--panel:#fff;--ink:#1c1e21;--muted:#697077;--line:#e6e8eb;--accent:#5b6cff;--good:#0aa37f;--warn:#f29900;--bad:#ea4335;--r:10px;--sh:0 1px 2px rgba(16,18,28,.06);--ff:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  body[data-fidelity=lofi]{--panel:#fffef9;--line:#cfcabb;--ink:#2b2b2b;--muted:#7a756a;--accent:#5f6368;--r:14px;--sh:none;--ff:"Comic Sans MS","Segoe Print","Bradley Hand",cursive}
  body[data-fidelity=hifi]{--bg:#fbfbfd;--panel:#fff;--ink:#0c0d12;--muted:#6b7280;--line:#ececf1;--accent:#5e6ad2;--r:8px;--sh:0 1px 3px rgba(16,18,40,.08),0 0 0 1px rgba(16,18,40,.03);--ff:Inter,-apple-system,Segoe UI,Roboto,sans-serif}
  body{margin:0;font:15px/1.5 var(--ff);color:var(--ink);background:var(--bg)}
  #lofi-banner{display:none}
  body[data-fidelity=lofi] #lofi-banner{display:block;background:#fff3cd;color:#7a5b00;text-align:center;padding:5px;font-size:12px;border-bottom:1px dashed #cfcabb}
  header{padding:16px 22px;background:var(--panel);border-bottom:1px solid var(--line)}
  h1{font-size:18px;margin:0}.sub{color:var(--muted);font-size:13px;margin-top:2px}
  main{max-width:680px;margin:0 auto;padding:26px 22px}
  .rail{display:flex;align-items:center;gap:8px;margin:0 0 22px;flex-wrap:wrap}
  .dot{display:flex;align-items:center;gap:7px;cursor:pointer;border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:4px 11px 4px 4px;font-size:12px;color:var(--muted)}
  .dot .n{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;background:var(--bg);font-size:11px;font-weight:600;color:var(--muted)}
  .dot.active{color:var(--ink);border-color:var(--accent)}.dot.active .n{background:var(--accent);color:#fff}
  .step{display:none;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:22px}
  .step.active{display:block}.step h2{font-size:19px;margin:0 0 16px}
  .el{margin:0 0 16px}.el label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}.el p{margin:0;max-width:62ch}
  input,select{font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r);width:100%;background:var(--bg);color:var(--ink)}
  input[type=range]{padding:0;accent-color:var(--accent)}
  .rangerow{display:flex;align-items:center;gap:12px}.rangerow input[type=range]{flex:1}.rangeval{font-variant-numeric:tabular-nums;font-weight:600;min-width:5ch;text-align:right}
  .computed{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:12px 14px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r)}
  .computed .clabel{color:var(--muted);font-size:13px}.computed .cval{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .barwrap{background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
  .barhead{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:7px}.barhead b{color:var(--ink);font-variant-numeric:tabular-nums}
  .bartrack{height:12px;background:var(--line);border-radius:999px;overflow:hidden}.barfill{height:100%;background:var(--accent);border-radius:999px;transition:width .18s ease}
  .chartwrap{background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
  .chartlegend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px}.chartlegend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .verdict{padding:14px 16px;border-radius:var(--r);border:1px solid var(--line);background:var(--bg);font-weight:600}
  .verdict[data-tone=good]{border-color:var(--good);color:var(--good)}.verdict[data-tone=warn]{border-color:var(--warn);color:var(--warn)}.verdict[data-tone=bad]{border-color:var(--bad);color:var(--bad)}
  .btn{font:inherit;border:1px solid transparent;background:var(--accent);color:#fff;border-radius:var(--r);padding:10px 17px;cursor:pointer;box-shadow:var(--sh)}.btn.secondary{background:var(--panel);color:var(--ink);border-color:var(--line)}
  .nav-row{display:flex;justify-content:space-between;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
  a{color:var(--accent)}
</style>
</head>
<body>
<div id="lofi-banner">Lo-Fi · zum Testen, nicht final</div>
<header><h1 id="apptitle">__TITLE__</h1><div class="sub" id="appsummary">__SUMMARY__</div></header>
<main><div class="rail" id="rail"></div><div id="steps"></div></main>
<script id="concept" type="application/json">__CONCEPT_JSON__</script>
<script>
(function(){
  var C = JSON.parse(document.getElementById('concept').textContent);
  document.body.dataset.fidelity = C.fidelity || 'midfi';
  document.getElementById('apptitle').textContent = C.title || 'Journey';
  document.getElementById('appsummary').textContent = C.summary || '';
  var screens = C.screens || [], ids = screens.map(function(s){return s.id;});
  var state = {};                 // ONE state shared across ALL screens (cross-screen model)
  var live = [];                  // {kind, el, ...nodes} recomputed on any input change

  // ---- safe evaluator (recursive descent; NO eval). Arithmetic + comparison + boolean (1/0). ----
  function evalExpr(expr){
    if(typeof expr!=='string') return Number(expr)||0;
    var toks = expr.match(/\d+\.?\d*|[A-Za-z_][A-Za-z0-9_]*|>=|<=|==|!=|&&|\|\||[-+*/(),%^<>!]/g) || [];
    var pos=0, FN={min:Math.min,max:Math.max,round:Math.round,abs:Math.abs,pow:Math.pow,floor:Math.floor,ceil:Math.ceil};
    function pk(){return toks[pos];} function nx(){return toks[pos++];}
    function or(){var v=and();while(pk()==='||'){nx();var r=and();v=(v||r)?1:0;}return v;}
    function and(){var v=cmp();while(pk()==='&&'){nx();var r=cmp();v=(v&&r)?1:0;}return v;}
    function cmp(){var v=add();while(['>','<','>=','<=','==','!='].indexOf(pk())>=0){var o=nx();var r=add();
      v=(o==='>'?v>r:o==='<'?v<r:o==='>='?v>=r:o==='<='?v<=r:o==='=='?v===r:v!==r)?1:0;}return v;}
    function add(){var v=mul();while(pk()==='+'||pk()==='-'){var o=nx();var r=mul();v=o==='+'?v+r:v-r;}return v;}
    function mul(){var v=pw();while(pk()==='*'||pk()==='/'||pk()==='%'){var o=nx();var r=pw();v=o==='*'?v*r:o==='/'?(r?v/r:0):(r?v%r:0);}return v;}
    function pw(){var v=un();if(pk()==='^'){nx();return Math.pow(v,pw());}return v;}
    function un(){if(pk()==='!'){nx();return un()?0:1;}if(pk()==='-'){nx();return -un();}if(pk()==='+'){nx();return un();}return atom();}
    function atom(){var t=pk();
      if(t==='('){nx();var v=or();if(pk()===')')nx();return v;}
      if(t!==undefined&&/^\d/.test(t)){nx();return parseFloat(t);}
      if(t!==undefined&&/^[A-Za-z_]/.test(t)){nx();
        if(pk()==='('){nx();var a=[];if(pk()!==')'){a.push(or());while(pk()===','){nx();a.push(or());}}if(pk()===')')nx();return FN[t]?FN[t].apply(null,a):0;}
        return (t in state)?(Number(state[t])||0):0;}
      nx();return 0;}
    try{var r=or();return (typeof r==='number'&&isFinite(r))?r:(r?1:0);}catch(e){return 0;}
  }
  function fmt(v,el){var d=(el.decimals!=null)?el.decimals:0;return (el.prefix||'')+Number(v).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d})+(el.suffix||'');}

  function recompute(){
    live.forEach(function(c){
      if(c.kind==='computed'){ c.node.textContent=fmt(evalExpr(c.el.formula),c.el); }
      else if(c.kind==='bar'){ var v=evalExpr(c.el.formula),mx=evalExpr(c.el.max!=null?c.el.max:100)||1;
        c.fill.style.width=Math.max(0,Math.min(100,(v/mx)*100))+'%'; c.val.textContent=fmt(v,c.el); }
      else if(c.kind==='verdict'){ var hit=null;
        (c.el.cases||[]).some(function(cs){ if(evalExpr(cs.when)){hit=cs;return true;} return false; });
        c.node.textContent = hit?hit.text:(c.el.else||''); c.node.dataset.tone = hit?(hit.tone||''):(c.el.elseTone||''); }
      else if(c.kind==='chart'||c.kind==='timeline'){ _drawChart(c); }
    });
  }
  function _drawChart(c){
    var el=c.el, x=el.x||{from:0,to:10,step:1}, series=el.series||(el.points?[{label:el.label,points:el.points}]:[]);
    var W=560,H=120,P=6, xs=[]; for(var v=x.from; v<=x.to+1e-9; v+=(x.step||1)) xs.push(v);
    var save=state[x.id], rows=series.map(function(s){
      return xs.map(function(xv){ state[x.id]=xv; return evalExpr(s.formula!=null?s.formula:0); });
    }); state[x.id]=save;
    var all=[].concat.apply([],rows), mx=Math.max.apply(null,all.concat([1])), mn=Math.min.apply(null,all.concat([0]));
    var cols=['#5b6cff','#ea4335','#0aa37f','#f29900'];
    function px(i){return P+(W-2*P)*(xs.length<2?0:i/(xs.length-1));}
    function py(val){return P+(H-2*P)*(1-(mx===mn?0.5:(val-mn)/(mx-mn)));}
    var paths=rows.map(function(r,si){return '<polyline fill="none" stroke="'+cols[si%4]+'" stroke-width="2" points="'+
      r.map(function(val,i){return px(i).toFixed(1)+','+py(val).toFixed(1);}).join(' ')+'"/>';}).join('');
    c.svg.innerHTML=paths;
    if(c.legend) c.legend.innerHTML=series.map(function(s,si){return '<span><i style="background:'+cols[si%4]+'"></i>'+(s.label||('Serie '+(si+1)))+'</span>';}).join('');
  }

  function show(id){var cur=ids.indexOf(id);
    document.querySelectorAll('.step').forEach(function(s){s.classList.toggle('active',s.dataset.id===id);});
    document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('active',d.dataset.id===id);});}

  function renderEl(el){
    var w=document.createElement('div'); w.className='el';
    if(el.kind==='text'){var p=document.createElement('p');p.textContent=el.label||'';w.appendChild(p);}
    else if(el.kind==='range'||el.kind==='number'){
      var l=document.createElement('label');l.textContent=el.label||el.id;w.appendChild(l);
      if(el.kind==='range'){var row=document.createElement('div');row.className='rangerow';
        var r=document.createElement('input');r.type='range';r.id=el.id;r.min=el.min!=null?el.min:0;r.max=el.max!=null?el.max:100;r.step=el.step!=null?el.step:1;r.value=el.value!=null?el.value:r.min;
        var o=document.createElement('span');o.className='rangeval';o.textContent=fmt(Number(r.value),el);state[el.id]=Number(r.value);
        r.addEventListener('input',function(){state[el.id]=Number(r.value);o.textContent=fmt(Number(r.value),el);recompute();});
        row.appendChild(r);row.appendChild(o);w.appendChild(row);}
      else{var n=document.createElement('input');n.type='number';n.id=el.id;n.value=el.value!=null?el.value:0;state[el.id]=Number(n.value);
        n.addEventListener('input',function(){state[el.id]=Number(n.value);recompute();});w.appendChild(n);}}
    else if(el.kind==='select'){var l2=document.createElement('label');l2.textContent=el.label||el.id;var sel=document.createElement('select');sel.id=el.id;
      (el.options||[]).forEach(function(op){var o=document.createElement('option');o.value=op;o.textContent=op;sel.appendChild(o);});
      state[el.id]=(el.options||[])[0]||'';sel.addEventListener('change',function(){state[el.id]=sel.value;recompute();});w.appendChild(l2);w.appendChild(sel);}
    else if(el.kind==='computed'){var c=document.createElement('div');c.className='computed';
      var cl=document.createElement('span');cl.className='clabel';cl.textContent=el.label||el.id;var cv=document.createElement('b');cv.className='cval';cv.id=el.id;
      c.appendChild(cl);c.appendChild(cv);w.appendChild(c);live.push({kind:'computed',el:el,node:cv});}
    else if(el.kind==='bar'){var bw=document.createElement('div');bw.className='barwrap';var bh=document.createElement('div');bh.className='barhead';
      var bl=document.createElement('span');bl.textContent=el.label||el.id;var bv=document.createElement('b');bv.id=el.id;bh.appendChild(bl);bh.appendChild(bv);
      var tr=document.createElement('div');tr.className='bartrack';var fl=document.createElement('div');fl.className='barfill';tr.appendChild(fl);
      bw.appendChild(bh);bw.appendChild(tr);w.appendChild(bw);live.push({kind:'bar',el:el,fill:fl,val:bv});}
    else if(el.kind==='verdict'){var vd=document.createElement('div');vd.className='verdict';vd.id=el.id;w.appendChild(vd);live.push({kind:'verdict',el:el,node:vd});}
    else if(el.kind==='chart'||el.kind==='timeline'){var cw=document.createElement('div');cw.className='chartwrap';
      if(el.label){var cl3=document.createElement('label');cl3.textContent=el.label;cw.appendChild(cl3);}
      var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox','0 0 560 120');svg.setAttribute('width','100%');svg.setAttribute('height','120');
      var lg=document.createElement('div');lg.className='chartlegend';cw.appendChild(svg);cw.appendChild(lg);w.appendChild(cw);live.push({kind:el.kind,el:el,svg:svg,legend:lg});}
    else if(el.kind==='link'){var a=document.createElement('a');a.href='#';a.id=el.id;a.textContent=el.label||el.id;if(el.goto){a.addEventListener('click',function(e){e.preventDefault();show(el.goto);});}w.appendChild(a);}
    else {var b=document.createElement('button');b.className='btn'+(el.variant==='secondary'?' secondary':'');b.id=el.id;b.textContent=el.label||el.id;if(el.goto){b.addEventListener('click',function(){show(el.goto);});}w.appendChild(b);}
    return w;
  }
  var rail=document.getElementById('rail'),root=document.getElementById('steps');
  screens.forEach(function(scr,i){
    var d=document.createElement('div');d.className='dot';d.dataset.id=scr.id;d.innerHTML='<span class="n">'+(i+1)+'</span>';d.appendChild(document.createTextNode(scr.title||scr.id));
    d.addEventListener('click',function(){show(scr.id);});rail.appendChild(d);
    var sec=document.createElement('div');sec.className='step';sec.dataset.id=scr.id;var h=document.createElement('h2');h.textContent=scr.title||scr.id;sec.appendChild(h);
    (scr.elements||[]).forEach(function(el){sec.appendChild(renderEl(el));});
    if(screens.length>1){var row=document.createElement('div');row.className='nav-row';
      var back=document.createElement('button');back.className='btn secondary';back.id='step-back';back.textContent='← Zurück';back.disabled=i===0;back.addEventListener('click',function(){if(i>0)show(ids[i-1]);});
      var nx2=document.createElement('button');nx2.className='btn';nx2.id='step-next';nx2.textContent=i===screens.length-1?'Fertig ✓':'Weiter →';nx2.addEventListener('click',function(){if(i<screens.length-1)show(ids[i+1]);});
      row.appendChild(back);row.appendChild(nx2);sec.appendChild(row);}
    root.appendChild(sec);
  });
  if(rail.children.length<=1) rail.style.display='none';
  recompute(); show(C.start||(screens[0]||{}).id);
})();
</script>
</body>
</html>
